<div class="main-outer">
  <form>
    <div class="container">
      <h3 style="margin-bottom: 20px ">Login</h3>
      <div class="row">
        <div class="col-12">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter your email</mat-label>
            <input
              matInput
              placeholder="pat@example.com"

            />
            @if (email.invalid) {
            <mat-error>{{errorMessage()}}</mat-error>
            }
          </mat-form-field>
        </div>

        <div class="col-12">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter your password</mat-label>
            <input
              type="{{showStatus?'text':'password'}}"
              matInput
              placeholder="Enter your password"

            />
            @if (email.invalid) {
            <mat-error>{{errorMessage()}}</mat-error>
            }
          </mat-form-field>
        </div>
        <div class="col-12" style="text-align: center;">
          <a routerLink="/security/forgot-password">Forgot Password</a><br>
        </div>
        <div class="col-12" style="text-align: center;">
          {{showStatus}}
          <mat-checkbox [ngModelOptions]="{standalone: true}" [(ngModel)]="showStatus" name="showStatus" class="example-margin">Show Password</mat-checkbox>
        </div>
        <div class="col-12">
          <button class="col-12" mat-raised-button color="primary">Access System</button>
        </div>
        <div class="col-12" style="text-align: center;">
          <br>
          OR
          <br>
          <br>
        </div>
        <div class="col-12">
          <button class="col-12" matButton="filled" color="primary" routerLink="/security/register">Create an Account</button>
        </div>
      </div>
    </div>

  </form>
</div>
