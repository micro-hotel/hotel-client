<div class="main-outer">
  <form>
    <div class="container">
      <h3 style="margin-bottom: 20px ">Verify Tour Email</h3>
      <div class="row">
        <div class="col-12">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter OTP here</mat-label>
            <input
              matInput
              type="text"
              name="otp"
              placeholder="Saman"

            />
          </mat-form-field>
        </div>
        <br>
        <br>
        <div class="col-12">
          <button class="col-12" matButton="filled" color="primary" routerLink="/security/reset-pwd">Verify Now</button>
        </div>
        <br>
        or
        <br>
        <div class="col-12">
          <button class="col-12" matButton="filled" color="primary" routerLink="/security/register">Change Email</button>
        </div>
      </div>
    </div>

  </form>
</div>
