<div class="main-outer">
  <form>
    <div class="container">
      <h3 style="margin-bottom: 20px ">Login</h3>
      <div class="row">
        <div class="col-12 col-sm-6">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter your first name</mat-label>
            <input
              matInput
              type="text"
              name="firstname"
              placeholder="Saman"

            />
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-6">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter your last name</mat-label>
            <input
              matInput
              type="text"
              name="lastName"
              placeholder="Saman"

            />
          </mat-form-field>
        </div>
        <div class="col-12">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter your email</mat-label>
            <input
              matInput
              placeholder="pat@example.com"

            />
            @if (email.invalid) {
            <mat-error>{{errorMessage()}}</mat-error>
            }
          </mat-form-field>
        </div>

        <div class="col-12">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter your password</mat-label>
            <input
              type="{{showStatus?'text':'password'}}"
              matInput
              placeholder="Enter your password"

            />
            @if (email.invalid) {
            <mat-error>{{errorMessage()}}</mat-error>
            }
          </mat-form-field>
        </div>
        <div class="col-12 col-sm-6">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Contact number</mat-label>
            <input
              matInput
              type="text"
              name="contactNumber"
              placeholder="Saman"
            />
          </mat-form-field>
        </div>
        <br>
        <br>
        <div class="col-12">
          <button class="col-12" matButton="filled" color="primary" routerLink="/security/register-verification/abc@gmail.com">Create an Account</button>
        </div>
        <br>
        OR
        <br>
        <div class="col-12">
          <button class="col-12" matButton="filled" color="primary" routerLink="/security/login">Already have an Account</button>
        </div>
      </div>
    </div>

  </form>
</div>
