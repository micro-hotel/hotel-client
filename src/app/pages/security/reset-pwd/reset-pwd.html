<div class="main-outer">
  <form>
    <div class="container">
      <h3 style="margin-bottom: 20px ">Reset Your Password</h3>
      <div class="row">

        <div class="col-12">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Enter your password</mat-label>
            <input
              type="{{showStatus?'text':'password'}}"
              matInput
              placeholder="Enter your password"

            />
          </mat-form-field>
        </div>
        <div class="col-12">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Confirm password</mat-label>
            <input
              type="{{showStatus?'text':'password'}}"
              matInput
              placeholder="Enter your password"

            />
          </mat-form-field>
        </div>
        <br>
        <div class="col-12">
          <button class="col-12" matButton="filled" color="primary" routerLink="/security/login">Back to login</button>
        </div>
        <br>
        OR
        <br>
        <div class="col-12">
          <button class="col-12" matButton="filled" color="primary" routerLink="/security/login">Already have an Account</button>
        </div>
      </div>
    </div>

  </form>
</div>
